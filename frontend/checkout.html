<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Inithat Custom Gifts</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="images/logo.png">
  <style>
    body { background: var(--gray-100); padding-top: 80px; }
    
    .checkout-container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; display: grid; grid-template-columns: 60% 35%; gap: 5%; align-items: start; }
    
    /* Left Column: Form */
    .checkout-form-col { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .section-title { font-size: 1.5rem; font-family: var(--font-display); font-weight: 700; color: var(--dark); margin-bottom: 20px; border-bottom: 1px solid var(--gray-200); padding-bottom: 10px; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 600; color: var(--gray-600); }
    .form-group input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid var(--gray-300); border-radius: 6px; font-family: var(--font-body); font-size: 1rem; color: var(--dark); outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--primary); }
    
    .form-row { display: flex; gap: 15px; }
    .form-row .form-group { flex: 1; }

    /* Right Column: Order Summary */
    .checkout-summary-col { background: var(--off-white); padding: 30px; border-radius: 12px; border: 1px solid var(--gray-200); position: sticky; top: 100px; }
    
    .summary-items { max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px; }
    .summary-item { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--gray-200); }
    .summary-item-details { flex: 1; margin-right: 15px; }
    .summary-item-name { font-weight: 600; color: var(--dark); font-size: 0.95rem; line-height: 1.3; margin-bottom: 5px; }
    .summary-item-qty { font-size: 0.85rem; color: var(--gray-500); }
    .summary-item-price { font-weight: 700; color: var(--dark); font-size: 1rem; }

    .summary-totals { margin-top: 20px; }
    .totals-row { display: flex; justify-content: space-between; font-size: 1rem; color: var(--gray-600); margin-bottom: 10px; }
    .totals-row.grand-total { font-size: 1.3rem; font-weight: 700; color: var(--primary); border-top: 1px solid var(--gray-300); padding-top: 15px; margin-top: 15px; }

    .proceed-btn { width: 100%; padding: 15px; background: var(--primary); color: var(--white); border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 700; font-family: var(--font-body); cursor: pointer; transition: all 0.3s; margin-top: 25px; box-shadow: 0 4px 10px rgba(196, 30, 58, 0.2); }
    .proceed-btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(196, 30, 58, 0.3); }

    /* Empty state */
    .empty-cart-msg { text-align: center; color: var(--gray-500); padding: 50px 0; font-size: 1.1rem; }
    .empty-cart-msg a { color: var(--primary); font-weight: 600; text-decoration: none; }

    /* Responsive */
    @media (max-width: 992px) {
      .checkout-container { grid-template-columns: 1fr; gap: 30px; }
      .checkout-summary-col { position: relative; top: 0; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <img src="images/logo.png" alt="Inithat Custom Gifts Logo" onerror="this.style.background='var(--primary)'; this.alt='I';">
      <div class="nav-brand-text">
        <span class="nav-brand-name">Inithat Custom Gifts</span>
        <span class="nav-brand-tagline">Made with Love</span>
      </div>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="bulk-retail.html">Bulk / Retail</a>
      <a href="offers.html">Offers</a>
      <a href="reviews.html">Reviews</a>
      <a href="contact.html">Contact</a>
      <a href="machines.html">Machines</a>
    </div>
    <div class="nav-actions">
      <!-- Minimal nav for checkout -->
    </div>
  </nav>

  <div class="checkout-container" id="mainContainer">
    <!-- Form Col -->
    <div class="checkout-form-col">
      <h2 class="section-title">Contact Information</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" required>
        </div>
      </div>

      <h2 class="section-title" style="margin-top: 30px;">Shipping Address</h2>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label>Flat, House no., Building, Company, Apartment</label>
        <input type="text" id="address1" placeholder="123 Main St, Apt 4B" required>
      </div>
      <div class="form-group">
        <label>Area, Street, Sector, Village</label>
        <input type="text" id="address2" placeholder="Downtown Area">
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Town / City</label>
          <input type="text" id="city" placeholder="Madurai" required>
        </div>
        <div class="form-group">
          <label>State</label>
          <input type="text" id="state" placeholder="Tamil Nadu" required>
        </div>
        <div class="form-group">
          <label>Pincode</label>
          <input type="text" id="pincode" placeholder="625001" required>
        </div>
      </div>
      <h2 class="section-title" style="margin-top: 30px;">Payment Method</h2>
      <div class="form-group" style="display: flex; flex-direction: column; gap: 10px;">
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 15px; border: 1px solid var(--primary); border-radius: 8px; background: rgba(196, 30, 58, 0.05);">
          <input type="radio" name="payment" value="online" checked style="width: auto;">
          <span style="font-weight: 600; color: var(--dark);">Razorpay (UPI, Cards, NetBanking)</span>
        </label>
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 15px; border: 1px solid var(--gray-300); border-radius: 8px;">
          <input type="radio" name="payment" value="cod" style="width: auto;">
          <span style="font-weight: 600; color: var(--gray-600);">Cash on Delivery (COD)</span>
        </label>
      </div>
    </div>

    <!-- Summary Col -->
    <div class="checkout-summary-col">
      <h2 class="section-title" style="border-bottom:none; margin-bottom: 10px;">Order Summary</h2>
      
      <div class="summary-items" id="summaryItems">
        <!-- Rendered via JS -->
      </div>

      <div class="summary-totals" id="summaryTotals" style="display:none;">
        <div class="totals-row">
          <span>Subtotal</span>
          <span id="subtotalAmt">₹0</span>
        </div>
        <div class="totals-row">
          <span>Shipping</span>
          <span style="color: var(--green); font-weight: 600;">FREE</span>
        </div>
        <div class="totals-row" id="deliveryEstRow" style="display: none; align-items: center; justify-content: space-between; font-size: 0.95rem; margin-top: 5px;">
          <span style="color: var(--primary); font-weight: 600;">📍 Est. Delivery</span>
          <span id="deliveryEstDate" style="color: var(--dark); font-weight: 500;"></span>
        </div>
        <div class="totals-row grand-total">
          <span>Total</span>
          <span id="totalAmt">₹0</span>
        </div>

        <button class="proceed-btn" onclick="processPayment()">PAY NOW</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCheckout();
    });

    function renderCheckout() {
      let items = typeof getUserCart === 'function' ? getUserCart() : [];
      
      // Dedupe items in case the cart has legacy unmerged duplicates
      const mergedItemsMap = new Map();
      items.forEach(item => {
        const qty = parseInt(item.qty) || 1;
        if (mergedItemsMap.has(item.name)) {
          const existing = mergedItemsMap.get(item.name);
          existing.qty += qty;
        } else {
          mergedItemsMap.set(item.name, { ...item, qty: qty });
        }
      });
      items = Array.from(mergedItemsMap.values());
      
      const summaryContainer = document.getElementById('summaryItems');
      const totalsContainer = document.getElementById('summaryTotals');

      // If cart is empty, show empty state and redirect
      if (items.length === 0) {
        summaryContainer.innerHTML = `
          <div class="empty-cart-msg">
            <p style="font-size: 3rem; margin-bottom: 10px;">🛒</p>
            <p style="font-weight: 600; font-size: 1.1rem; color: var(--dark); margin-bottom: 8px;">Your cart is empty!</p>
            <a href="products.html">Browse Products →</a>
          </div>
        `;
        return;
      }

      let html = '';
      let subtotal = 0;

      items.forEach(item => {
        // Handle items with or without quantity (older cart structure)
        const qty = item.qty || 1;
        const itemTotal = Number(item.price) * qty;
        subtotal += itemTotal;

        html += `
          <div class="summary-item">
            <div class="summary-item-details">
              <div class="summary-item-name">${item.name}</div>
              <div class="summary-item-qty">Qty: ${qty} × ₹${Number(item.price).toLocaleString('en-IN')}</div>
            </div>
            <div class="summary-item-price">₹${itemTotal.toLocaleString('en-IN')}</div>
          </div>
        `;
      });

      summaryContainer.innerHTML = html;
      document.getElementById('subtotalAmt').innerText = `₹${subtotal.toLocaleString('en-IN')}`;
      document.getElementById('totalAmt').innerText = `₹${subtotal.toLocaleString('en-IN')}`;
      totalsContainer.style.display = 'block';

      // Pre-fill email if logged in
      if (typeof isLoggedIn === 'function' && isLoggedIn()) {
        const userStr = localStorage.getItem('inithat_user');
        if (userStr) {
          const user = JSON.parse(userStr);
          document.getElementById('email').value = user.email || '';
          document.getElementById('fullName').value = user.name || '';
        }
      }

      // Add Pincode Delivery listener
      const pincodeInput = document.getElementById('pincode');
      pincodeInput.addEventListener('input', (e) => {
        const pin = e.target.value.trim();
        const estRow = document.getElementById('deliveryEstRow');
        const estDate = document.getElementById('deliveryEstDate');
        
        if (pin.length === 6 && !isNaN(pin)) {
          let days = 7;
          if (pin.startsWith('62')) days = 3;
          else if (pin.startsWith('6') || pin.startsWith('5')) days = 5;

          const deliveryDate = new Date();
          deliveryDate.setDate(deliveryDate.getDate() + days);
          const options = { weekday: 'long', month: 'short', day: 'numeric' };
          
          estDate.innerText = deliveryDate.toLocaleDateString('en-IN', options);
          estRow.style.display = 'flex';
        } else {
          estRow.style.display = 'none';
        }
      });
    }

    function processPayment() {
      // Basic validation
      const requiredFields = ['email', 'phone', 'fullName', 'address1', 'city', 'state', 'pincode'];
      for (let id of requiredFields) {
        if (!document.getElementById(id).value.trim()) {
          alert(`Please fill out your ${id.replace(/[A-Z]/g, ' $&').toLowerCase()}.`);
          document.getElementById(id).focus();
          return;
        }
      }

      // Proceed to mock Razorpay
      const btn = document.querySelector('.proceed-btn');
      btn.innerText = 'Processing...';
      btn.style.opacity = '0.7';
      btn.disabled = true;

      setTimeout(() => {
        alert('Payment Gateway Integration Pending. Order placed successfully as a test!');
        
        // Clear cart
        if (typeof saveUserCart === 'function') {
          saveUserCart([]);
        }
        
        window.location.href = 'index.html';
      }, 1500);
    }
  </script>
</body>
</html>
