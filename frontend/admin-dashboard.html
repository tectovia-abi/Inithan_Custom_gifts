<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Inithat Custom Gifts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body class="admin-body">

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-brand">
        <img src="images/logo.png" alt="Logo" class="admin-logo" onerror="this.style.display='none'">
        <div class="admin-brand-text">
          <h2>Inithat Gifts</h2>
          <span>Admin Panel</span>
        </div>
      </div>
      
      <nav class="admin-nav">
          <a href="admin-dashboard.html" class="admin-nav-link active">
            <span>📊</span> Dashboard
          </a>
          <a href="admin-products.html" class="admin-nav-link">
            <span>🛍️</span> Products
          </a>
          <a href="admin-users.html" class="admin-nav-link">
            <span>👥</span> Users
          </a>
          <a href="admin-inquiries.html" class="admin-nav-link">
            <span>📝</span> Bulk Inquiries
          </a>
      </nav>

      <div class="admin-sidebar-footer">
        <a href="index.html" class="admin-nav-link">
          <span class="icon">🏠</span> Back to Store
        </a>
        <a href="#" class="admin-nav-link logout-link" onclick="logout()">
          <span class="icon">🚪</span> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div class="header-title" id="headerTitle">Dashboard Overview</div>
        <div class="header-user">
          <span id="adminName">Admin User</span>
          <div class="admin-avatar" id="adminAvatar">A</div>
        </div>
      </header>

      <div class="admin-content">
        <!-- Dashboard Overview -->
        <section id="dashboardSection" class="admin-section active">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon" style="background: rgba(196, 30, 58, 0.1); color: var(--primary);">🎁</div>
              <div class="stat-details">
                <h3>Total Products</h3>
                <h2 id="totalProducts">0</h2>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background: rgba(45, 106, 79, 0.1); color: #2D6A4F;">👥</div>
              <div class="stat-details">
                <h3>Registered Users</h3>
                <h2 id="totalUsers">0</h2>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background: rgba(212, 168, 83, 0.1); color: var(--gold);">📨</div>
              <div class="stat-details">
                <h3>Total Inquiries</h3>
                <h2 id="totalInquiries">0</h2>
              </div>
            </div>
          </div>

          <!-- Inquiry Details Modal -->
          <div class="modal" id="inquiryModal">
            <div class="modal-content" style="max-width: 700px;">
              <div class="modal-header">
                <h3 id="inquiryModalTitle">Inquiry Details</h3>
                <button class="close-modal" onclick="closeInquiryModal()">×</button>
              </div>
              <div class="modal-body" id="inquiryModalBody">
                <!-- Content dynamically injected here -->
              </div>
            </div>
          </div>

          <div class="recent-activity">
            <div class="card">
              <div class="card-header">
                <h3>Recent Inquiries</h3>
              </div>
              <div class="table-responsive">
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Name</th>
                      <th>Email</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="recentInquiriesBody">
                    <tr><td colspan="4" class="text-center">Loading...</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
            </div>
        </section>

      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
