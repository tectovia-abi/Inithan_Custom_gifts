<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Inithat Custom Gifts</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="images/logo.png">
  <style>
    body {
      background: var(--gray-100);
      padding-top: 80px;
    }

    .cart-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      display: grid;
      grid-template-columns: 65% 30%;
      gap: 5%;
      align-items: start;
    }

    .section-title {
      font-size: 1.8rem;
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 20px;
    }

    /* Left Column: Cart Items */
    .cart-items-col {
      background: var(--white);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
    }

    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid var(--gray-200);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item-info {
      display: flex;
      align-items: center;
      gap: 20px;
      flex: 2;
    }

    .cart-item-img {
      width: 80px;
      height: 80px;
      background: var(--off-white);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 1px solid var(--gray-200);
    }

    .cart-item-details h3 {
      font-size: 1.1rem;
      color: var(--dark);
      margin-bottom: 5px;
      font-weight: 600;
    }

    .cart-item-price {
      color: var(--primary);
      font-weight: 700;
      font-size: 1.05rem;
    }

    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 20px;
      flex: 1;
      justify-content: flex-end;
    }

    .qty-control {
      display: flex;
      align-items: center;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      overflow: hidden;
    }

    .qty-btn {
      background: var(--off-white);
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
      color: var(--dark);
      transition: background 0.2s;
    }

    .qty-btn:hover {
      background: var(--gray-200);
    }

    .qty-input {
      width: 40px;
      text-align: center;
      border: none;
      border-left: 1px solid var(--gray-300);
      border-right: 1px solid var(--gray-300);
      font-weight: 600;
      font-family: var(--font-body);
      pointer-events: none;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--gray-500);
      cursor: pointer;
      font-size: 1.2rem;
      transition: color 0.2s;
      padding: 5px;
    }

    .remove-btn:hover {
      color: var(--primary);
    }

    /* Right Column: Order Summary */
    .cart-summary-col {
      background: var(--white);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid var(--gray-200);
      position: sticky;
      top: 100px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
    }

    .summary-title {
      font-size: 1.3rem;
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 20px;
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: 15px;
    }

    .totals-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.05rem;
      color: var(--gray-600);
      margin-bottom: 15px;
    }

    .totals-row.grand-total {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--dark);
      border-top: 1px solid var(--gray-300);
      padding-top: 20px;
      margin-top: 10px;
    }

    .proceed-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(196, 30, 58, 0.2);
    }

    .proceed-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(196, 30, 58, 0.3);
    }

    .continue-shopping {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .continue-shopping:hover {
      text-decoration: underline;
    }

    /* Empty state */
    .empty-cart-msg {
      text-align: center;
      color: var(--gray-500);
      padding: 60px 20px;
      font-size: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .empty-cart-icon {
      font-size: 4rem;
      color: var(--gray-300);
    }

    .empty-cart-msg a {
      display: inline-block;
      padding: 12px 30px;
      background: var(--primary);
      color: white;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      font-size: 1rem;
    }

    .empty-cart-msg a:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(196, 30, 58, 0.2);
    }

    /* Responsive */
    @media (max-width: 992px) {
      .cart-container {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      .cart-summary-col {
        position: relative;
        top: 0;
      }
    }

    @media (max-width: 600px) {
      .cart-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .cart-item-actions {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <img src="images/logo.png" alt="Inithat Custom Gifts Logo"
        onerror="this.style.background='var(--primary)'; this.alt='I';">
      <div class="nav-brand-text">
        <span class="nav-brand-name">Inithat Custom Gifts</span>
        <span class="nav-brand-tagline">Made with Love</span>
      </div>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="bulk-retail.html">Bulk / Retail</a>
      <a href="offers.html">Offers</a>
      <a href="reviews.html">Reviews</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-actions">
      <a href="login.html" class="nav-auth-btn login-btn" id="navLoginBtn">LOGIN</a>
      <a href="signup.html" class="nav-auth-btn signup-btn" id="navSignupBtn">SIGN UP</a>
      <span id="navUserGreet" style="display:none; color:var(--gold); font-weight:600; font-size:0.85rem;"></span>
      <button onclick="logout()" class="nav-auth-btn login-btn" id="navLogoutBtn"
        style="display:none; cursor:pointer; border:none;">LOGOUT</button>
      <div class="nav-cart" id="navCart" style="cursor: pointer;" onclick="window.location.href='cart.html'">
        <span class="cart-icon">🛒</span>
        <span>CART</span>
        <span class="cart-count" id="cartCount">0</span>
      </div>
      <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle mobile menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="cart-container" id="mainContainer">
    <!-- Items Col -->
    <div class="cart-items-col">
      <h1 class="section-title">Your Cart (<span id="cartItemCountTitle">0</span>)</h1>
      <div id="cartItemsContainer">
        <!-- Rendered via JS -->
      </div>
    </div>

    <!-- Summary Col -->
    <div class="cart-summary-col">
      <h2 class="summary-title">Order Summary</h2>

      <div class="totals-row">
        <span>Subtotal</span>
        <span id="subtotalAmt">₹0</span>
      </div>
      <div class="totals-row">
        <span>Shipping</span>
        <span style="color: var(--green); font-weight: 600;">FREE</span>
      </div>
      <div class="totals-row grand-total">
        <span>Total</span>
        <span id="totalAmt">₹0</span>
      </div>

      <button class="proceed-btn" id="checkoutBtn" onclick="proceedToCheckout()">Proceed to Checkout</button>
      <a href="products.html" class="continue-shopping">Continue Shopping</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCart();
    });

    function renderCart() {
      const itemsContainer = document.getElementById('cartItemsContainer');
      const checkoutBtn = document.getElementById('checkoutBtn');
      let items = typeof getUserCart === 'function' ? getUserCart() : [];

      // Dedupe items in case the cart has legacy unmerged duplicates
      const mergedItemsMap = new Map();
      items.forEach(item => {
        const qty = parseInt(item.qty) || 1;
        if (mergedItemsMap.has(item.name)) {
          const existing = mergedItemsMap.get(item.name);
          existing.qty += qty;
        } else {
          mergedItemsMap.set(item.name, { ...item, qty: qty });
        }
      });
      items = Array.from(mergedItemsMap.values());

      if (items.length === 0) {
        itemsContainer.innerHTML = `
          <div class="empty-cart-msg">
            <div class="empty-cart-icon">🛒</div>
            <div>Your cart is empty</div>
            <a href="products.html">Start Shopping</a>
          </div>
        `;
        document.getElementById('cartItemCountTitle').innerText = '0';
        document.getElementById('subtotalAmt').innerText = '₹0';
        document.getElementById('totalAmt').innerText = '₹0';
        checkoutBtn.disabled = true;
        checkoutBtn.style.opacity = '0.5';
        checkoutBtn.style.cursor = 'not-allowed';
        return;
      }

      let html = '';
      let subtotal = 0;
      let totalItems = 0;

      items.forEach((item, index) => {
        const qty = item.qty || 1;
        const itemTotal = Number(item.price) * qty;
        subtotal += itemTotal;
        totalItems += qty;

        const img = item.imageUrl || 'images/gift-box.png';
        const link = item.productId ? `product-details.html?id=${item.productId}` : '#';

        html += `
          <div class="cart-item">
            <div class="cart-item-info">
              <a href="${link}" style="display: block; text-decoration: none;">
                <div class="cart-item-img" style="overflow: hidden; padding: 0;">
                  <img src="${img}" alt="${item.name}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='images/gift-box.png'">
                </div>
              </a>
              <div class="cart-item-details">
                <a href="${link}" style="text-decoration: none; color: inherit;">
                  <h3 style="transition: color 0.2s; margin-bottom: 5px;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--dark)'">${item.name}</h3>
                </a>
                <span style="display: block; font-size: 0.85rem; color: #666; margin-bottom: 10px;">${item.category || 'Custom Gift'}</span>
                <div class="cart-item-price">₹${Number(item.price).toLocaleString('en-IN')}</div>
              </div>
            </div>
            <div class="cart-item-actions">
              <div class="qty-control">
                <button class="qty-btn" onclick="updateItemQty(${index}, -1)">-</button>
                <input type="text" class="qty-input" value="${qty}" readonly>
                <button class="qty-btn" onclick="updateItemQty(${index}, 1)">+</button>
              </div>
              <button class="remove-btn" onclick="removeItem(${index})" title="Remove item">🗑️</button>
            </div>
          </div>
        `;
      });

      itemsContainer.innerHTML = html;
      document.getElementById('cartItemCountTitle').innerText = totalItems;
      document.getElementById('subtotalAmt').innerText = `₹${subtotal.toLocaleString('en-IN')}`;
      document.getElementById('totalAmt').innerText = `₹${subtotal.toLocaleString('en-IN')}`;

      checkoutBtn.disabled = false;
      checkoutBtn.style.opacity = '1';
      checkoutBtn.style.cursor = 'pointer';
    }

    function updateItemQty(index, change) {
      let items = typeof getUserCart === 'function' ? getUserCart() : [];
      if (!items[index]) return;

      let newQty = (parseInt(items[index].qty) || 1) + change;
      if (newQty < 1) newQty = 1;

      items[index].qty = newQty;
      saveUserCart(items);
      renderCart();
      updateCartCount();
    }

    function removeItem(index) {
      let items = typeof getUserCart === 'function' ? getUserCart() : [];
      if (!items[index]) return;

      items.splice(index, 1);
      saveUserCart(items);
      renderCart();
      updateCartCount();
      showNotification('Item removed from cart.');
    }

    function proceedToCheckout() {
      // Check login status first
      if (typeof isLoggedIn === 'function' && !isLoggedIn()) {
        showNotification('🔒 Please login to proceed to checkout!');
        setTimeout(() => {
          window.location.href = 'login.html?redirect=checkout';
        }, 1200);
        return;
      }
      window.location.href = 'checkout.html';
    }
  </script>
</body>

</html>
