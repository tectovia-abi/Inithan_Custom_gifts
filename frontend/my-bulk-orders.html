<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bulk Orders | Inithat Custom Gifts</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="images/logo.png">
  <style>
    body { padding-top: 80px; background: #FFFDF9; }
    .orders-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; min-height: 60vh; }
    .orders-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .orders-header h1 { font-family: var(--font-display, 'Playfair Display', serif); color: var(--dark); font-size: 2.2rem; }
    
    .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; border: 1px solid var(--gray-200); }
    .orders-table { width: 100%; border-collapse: collapse; min-width: 800px; }
    .orders-table th { background: #f9f9f9; padding: 15px 20px; text-align: left; color: var(--gray-600); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid var(--gray-200); }
    .orders-table td { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); color: var(--dark); font-size: 0.95rem; }
    .orders-table tr:hover { background: #fdfdfd; }
    
    .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: inline-block; }
    .status-new { background: #e0f2fe; color: #0284c7; }
    .status-reviewed { background: #fef08a; color: #854d0e; }
    .status-resolved { background: #dcfce7; color: #166534; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }
    
    .loading-state, .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-500); }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <img src="images/logo.png" alt="Inithat Custom Gifts Logo" onerror="this.style.background='var(--primary)'; this.alt='I';">
      <div class="nav-brand-text">
        <span class="nav-brand-name">Inithat Custom Gifts</span>
        <span class="nav-brand-tagline">Made with Love</span>
      </div>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="bulk-retail.html">Bulk / Retail</a>
      <a href="offers.html">Offers</a>
      <a href="reviews.html">Reviews</a>
      <a href="contact.html">Contact</a>
      <a href="machines.html">Machines</a>
    </div>
    <div class="nav-actions">
      <a href="login.html" class="nav-auth-btn login-btn" id="navLoginBtn">LOGIN</a>
      <a href="signup.html" class="nav-auth-btn signup-btn" id="navSignupBtn">SIGN UP</a>
      <span id="navUserGreet" style="display:none; color:var(--gold); font-weight:600; font-size:0.85rem;"></span>
      <button onclick="logout()" class="nav-auth-btn login-btn" id="navLogoutBtn" style="display:none; cursor:pointer; border:none;">LOGOUT</button>
      <div class="nav-cart" id="navCart">
        <span class="cart-icon">🛒</span>
        <span>CART</span>
        <span class="cart-count" id="cartCount">0</span>
      </div>
      <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle mobile menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="orders-container">
    <div class="orders-header">
      <h1>My Bulk Order Requests</h1>
      <a href="bulk-retail.html" style="background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600;">+ New Request</a>
    </div>

    <div class="table-responsive">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Reference ID</th>
            <th>Date Submitted</th>
            <th>Products</th>
            <th>Quantity</th>
            <th>Budget</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody">
          <tr>
            <td colspan="6" class="loading-state">Loading your requests...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = getAuthUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      
      const tableBody = document.getElementById('ordersTableBody');
      
      try {
        const token = localStorage.getItem('inithat_token') || sessionStorage.getItem('inithat_token') || getCookie('inithat_token');
        const response = await fetch(`${API_BASE}/api/bulk-inquiry/user/${user.email}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        const data = await response.json();
        
        if (data.success && data.inquiries.length > 0) {
          tableBody.innerHTML = '';
          data.inquiries.forEach(order => {
            const date = new Date(order.submittedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            
            let statusClass = 'status-new';
            if (order.status === 'Reviewed') statusClass = 'status-reviewed';
            if (order.status === 'Resolved') statusClass = 'status-resolved';
            if (order.status === 'Cancelled') statusClass = 'status-cancelled';
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td><strong>${order.referenceId || 'N/A'}</strong></td>
              <td>${date}</td>
              <td>${order.products && order.products.length ? order.products.join(', ') : 'N/A'}</td>
              <td>${order.quantity} units</td>
              <td>${order.budgetRange}</td>
              <td><span class="status-badge ${statusClass}">${order.status}</span></td>
            `;
            tableBody.appendChild(tr);
          });
        } else {
          tableBody.innerHTML = `<tr><td colspan="6" class="empty-state">You haven't submitted any bulk order requests yet. <br><br> <a href="bulk-retail.html" style="color: var(--primary); text-decoration: underline;">Submit your first request here</a></td></tr>`;
        }
      } catch (error) {
        console.error('Error fetching orders:', error);
        tableBody.innerHTML = `<tr><td colspan="6" class="empty-state" style="color: red;">Error loading orders. Please try again later.</td></tr>`;
      }
    });
  </script>
</body>
</html>
