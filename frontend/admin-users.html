<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Inithat Custom Gifts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body class="admin-body">

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-brand">
        <img src="images/logo.png" alt="Logo" class="admin-logo" onerror="this.style.display='none'">
        <div class="admin-brand-text">
          <h2>Inithat Gifts</h2>
          <span>Admin Panel</span>
        </div>
      </div>
      
      <nav class="admin-nav">
          <a href="admin-dashboard.html" class="admin-nav-link">
            <span>📊</span> Dashboard
          </a>
          <a href="admin-products.html" class="admin-nav-link">
            <span>🛍️</span> Products
          </a>
          <a href="admin-categories.html" class="admin-nav-link">
            <span>🗂️</span> Categories
          </a>
          <a href="admin-users.html" class="admin-nav-link active">
            <span>👥</span> Users
          </a>
          <a href="admin-inquiries.html" class="admin-nav-link">
            <span>📝</span> Bulk Inquiries
          </a>
      </nav>

      <div class="admin-sidebar-footer">
        <a href="index.html" class="admin-nav-link">
          <span class="icon">🏠</span> Back to Store
        </a>
        <a href="#" class="admin-nav-link logout-link" onclick="logout()">
          <span class="icon">🚪</span> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div class="header-title" id="headerTitle">Manage Users</div>
        <div class="header-user">
          <span id="adminName">Admin User</span>
          <div class="admin-avatar" id="adminAvatar">A</div>
        </div>
      </header>

      <div class="admin-content">
        <section id="usersSection" class="admin-section active">
          <div class="section-header">
            <h2>Registered Users</h2>
          </div>
          <div class="card">
            <div class="table-responsive">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Joined</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Role</th>
                  </tr>
                </thead>
                <tbody id="usersTableBody">
                  <tr><td colspan="5" class="text-center">Loading...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
